<!DOCTYPE html>
<html>
<head>
    <title>Customer Churn Predictor</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 40px;
        }

        .container {
            width: 500px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 4px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #0056b3;
        }

        #result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
        }

        .loading {
            color: orange;
        }

        .success {
            color: green;
        }

        .error {
            color: red;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Customer Churn Predictor</h1>

    <form id="predictForm">

        <label>Gender</label>
        <input type="text" id="gender" placeholder="Male or Female">

        <label>Senior Citizen</label>
        <input type="number" id="SeniorCitizen" placeholder="0 = No, 1 = Yes">

        <label>Partner</label>
        <input type="text" id="Partner" placeholder="Yes or No">

        <label>Dependents</label>
        <input type="text" id="Dependents" placeholder="Yes or No">

        <label>Tenure (Months)</label>
        <input type="number" id="tenure" placeholder="Months">

        <label>Phone Service</label>
        <input type="text" id="PhoneService" placeholder="Yes or No">

        <label>Multiple Lines</label>
        <input type="text" id="MultipleLines" placeholder="Yes or No">

        <label>Internet Service</label>
        <input type="text" id="InternetService" placeholder="DSL / Fiber optic / No">

        <label>Online Security</label>
        <input type="text" id="OnlineSecurity" placeholder="Yes or No">

        <label>Online Backup</label>
        <input type="text" id="OnlineBackup" placeholder="Yes or No">

        <label>Device Protection</label>
        <input type="text" id="DeviceProtection" placeholder="Yes or No">

        <label>Tech Support</label>
        <input type="text" id="TechSupport" placeholder="Yes or No">

        <label>Streaming TV</label>
        <input type="text" id="StreamingTV" placeholder="Yes or No">

        <label>Streaming Movies</label>
        <input type="text" id="StreamingMovies" placeholder="Yes or No">

        <label>Contract</label>
        <input type="text" id="Contract" placeholder="Month-to-month / One year / Two year">

        <label>Paperless Billing</label>
        <input type="text" id="PaperlessBilling" placeholder="Yes or No">

        <label>Payment Method</label>
        <input type="text" id="PaymentMethod" placeholder="Electronic check">

        <label>Monthly Charges</label>
        <input type="number" step="0.01" id="MonthlyCharges">

        <label>Total Charges</label>
        <input type="number" step="0.01" id="TotalCharges">

        <button type="submit">Predict Churn</button>

    </form>

    <div id="result"></div>

</div>

<script>

document.getElementById("predictForm").addEventListener("submit", async function(e){

    e.preventDefault();

    const resultBox = document.getElementById("result");

    resultBox.className = "loading";
    resultBox.innerText = "Predicting...";

    const payload = {

        gender: document.getElementById("gender").value,
        SeniorCitizen: parseInt(document.getElementById("SeniorCitizen").value),
        Partner: document.getElementById("Partner").value,
        Dependents: document.getElementById("Dependents").value,
        tenure: parseInt(document.getElementById("tenure").value),
        PhoneService: document.getElementById("PhoneService").value,
        MultipleLines: document.getElementById("MultipleLines").value,
        InternetService: document.getElementById("InternetService").value,
        OnlineSecurity: document.getElementById("OnlineSecurity").value,
        OnlineBackup: document.getElementById("OnlineBackup").value,
        DeviceProtection: document.getElementById("DeviceProtection").value,
        TechSupport: document.getElementById("TechSupport").value,
        StreamingTV: document.getElementById("StreamingTV").value,
        StreamingMovies: document.getElementById("StreamingMovies").value,
        Contract: document.getElementById("Contract").value,
        PaperlessBilling: document.getElementById("PaperlessBilling").value,
        PaymentMethod: document.getElementById("PaymentMethod").value,
        MonthlyCharges: parseFloat(document.getElementById("MonthlyCharges").value),
        TotalCharges: parseFloat(document.getElementById("TotalCharges").value)

    };

    console.log("Payload Sent:", payload);

    try {

        const response = await fetch("/predict", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
        });

        const data = await response.json();

        console.log("API Response:", data);

        resultBox.className = "success";

        resultBox.innerText =
            "Prediction: " + data.prediction +
            " | Probability: " + data.probability;

    } catch(error) {

        console.log(error);

        resultBox.className = "error";
        resultBox.innerText = "Error connecting to API";

    }

});

</script>

</body>
</html>
