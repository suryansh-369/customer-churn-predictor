<!DOCTYPE html>
<html>
<head>
    <title>Customer Churn Predictor</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            padding: 40px;
        }

        .container {
            width: 500px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
        }

        label {
            font-weight: bold;
            margin-top: 10px;
            display: block;
        }

        select, input {
            width: 100%;
            padding: 8px;
            margin-top: 4px;
        }

        button {
            margin-top: 20px;
            padding: 12px;
            width: 100%;
            background: #007bff;
            color: white;
            border: none;
        }

        #result {
            margin-top: 20px;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="container">

<h2>Customer Churn Predictor</h2>

<form id="predictForm">

<label>Gender</label>
<select id="gender">
<option value="Male">Male</option>
<option value="Female">Female</option>
</select>

<label>Senior Citizen</label>
<input type="number" id="SeniorCitizen">

<label>Partner</label>
<select id="Partner">
<option value="Yes">Yes</option>
<option value="No">No</option>
</select>

<label>Dependents</label>
<select id="Dependents">
<option value="Yes">Yes</option>
<option value="No">No</option>
</select>

<label>Tenure</label>
<input type="number" id="tenure">

<label>Phone Service</label>
<select id="PhoneService">
<option value="Yes">Yes</option>
<option value="No">No</option>
</select>

<label>Multiple Lines</label>
<select id="MultipleLines">
<option value="Yes">Yes</option>
<option value="No">No</option>
<option value="No phone service">No phone service</option>
</select>

<label>Internet Service</label>
<select id="InternetService">
<option value="DSL">DSL</option>
<option value="Fiber optic">Fiber optic</option>
<option value="No">No</option>
</select>

<label>Online Security</label>
<select id="OnlineSecurity">
<option value="Yes">Yes</option>
<option value="No">No</option>
<option value="No internet service">No internet service</option>
</select>

<label>Online Backup</label>
<select id="OnlineBackup">
<option value="Yes">Yes</option>
<option value="No">No</option>
<option value="No internet service">No internet service</option>
</select>

<label>Device Protection</label>
<select id="DeviceProtection">
<option value="Yes">Yes</option>
<option value="No">No</option>
<option value="No internet service">No internet service</option>
</select>

<label>Tech Support</label>
<select id="TechSupport">
<option value="Yes">Yes</option>
<option value="No">No</option>
<option value="No internet service">No internet service</option>
</select>

<label>Streaming TV</label>
<select id="StreamingTV">
<option value="Yes">Yes</option>
<option value="No">No</option>
<option value="No internet service">No internet service</option>
</select>

<label>Streaming Movies</label>
<select id="StreamingMovies">
<option value="Yes">Yes</option>
<option value="No">No</option>
<option value="No internet service">No internet service</option>
</select>

<label>Contract</label>
<select id="Contract">
<option value="Month-to-month">Month-to-month</option>
<option value="One year">One year</option>
<option value="Two year">Two year</option>
</select>

<label>Paperless Billing</label>
<select id="PaperlessBilling">
<option value="Yes">Yes</option>
<option value="No">No</option>
</select>

<label>Payment Method</label>
<select id="PaymentMethod">
<option value="Electronic check">Electronic check</option>
<option value="Mailed check">Mailed check</option>
<option value="Bank transfer (automatic)">Bank transfer (automatic)</option>
<option value="Credit card (automatic)">Credit card (automatic)</option>
</select>

<label>Monthly Charges</label>
<input type="number" step="0.01" id="MonthlyCharges">

<label>Total Charges</label>
<input type="number" step="0.01" id="TotalCharges">

<button type="submit">Predict</button>

</form>

<div id="result"></div>

</div>

<script>
document.getElementById("predictForm").addEventListener("submit", async function(e){

e.preventDefault();

const payload = {
gender: document.getElementById("gender").value,
SeniorCitizen: parseInt(document.getElementById("SeniorCitizen").value),
Partner: document.getElementById("Partner").value,
Dependents: document.getElementById("Dependents").value,
tenure: parseInt(document.getElementById("tenure").value),
PhoneService: document.getElementById("PhoneService").value,
MultipleLines: document.getElementById("MultipleLines").value,
InternetService: document.getElementById("InternetService").value,
OnlineSecurity: document.getElementById("OnlineSecurity").value,
OnlineBackup: document.getElementById("OnlineBackup").value,
DeviceProtection: document.getElementById("DeviceProtection").value,
TechSupport: document.getElementById("TechSupport").value,
StreamingTV: document.getElementById("StreamingTV").value,
StreamingMovies: document.getElementById("StreamingMovies").value,
Contract: document.getElementById("Contract").value,
PaperlessBilling: document.getElementById("PaperlessBilling").value,
PaymentMethod: document.getElementById("PaymentMethod").value,
MonthlyCharges: parseFloat(document.getElementById("MonthlyCharges").value),
TotalCharges: parseFloat(document.getElementById("TotalCharges").value)
};

const res = await fetch("/predict", {
method: "POST",
headers: {"Content-Type": "application/json"},
body: JSON.stringify(payload)
});

const data = await res.json();
document.getElementById("result").innerText =
"Prediction: " + data.prediction + " | Prob: " + data.probability + " | Risk: " + data.risk_level;

});
</script>

</body>
</html>
